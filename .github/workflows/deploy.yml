name: 🚀 Build & Deploy Laravel app to VPS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.3' # adapte à ta version

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Set up SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Deploy Laravel app to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'

          # === VARIABLES ===
          APP_NAME=Roulette_Lara               # ⚙️ Nom de ton dossier projet (à adapter)
          APP_DIR=/var/www/html/$APP_NAME
          REPO_URL=git@github.com:DocCreeps/Roulette_Lara.git
          TEMP_DIR=/tmp/deploy_backup_$$

          echo "=== 🚀 Déploiement de $APP_NAME ==="

          # === Préparation du répertoire ===
          sudo mkdir -p /var/www/html
          sudo chown -R $USER:$USER /var/www/html
          sudo chmod -R 755 /var/www/html

          if [ ! -d "$APP_DIR" ]; then
              echo "Clonage initial du dépôt..."
              git clone $REPO_URL $APP_DIR
          fi

          cd $APP_DIR

          # === Sauvegarde du .env ===
          mkdir -p $TEMP_DIR
          if [ -f .env ]; then
              echo "Sauvegarde du .env..."
              cp .env $TEMP_DIR/.env.backup
          fi

          # === Mise à jour du code ===
          echo "Mise à jour du dépôt..."
          git fetch origin
          git reset --hard origin/master
          git pull origin master

          # === Restauration du .env ===
          if [ -f $TEMP_DIR/.env.backup ]; then
              echo "Restauration du .env..."
              mv $TEMP_DIR/.env.backup .env
          elif [ -f .env.example ]; then
              echo "Création du .env depuis .env.example..."
              cp .env.example .env
              php artisan key:generate
          fi

          # === Dépendances backend ===
          if [ -f composer.json ]; then
              echo "Installation des dépendances PHP..."
              composer install --no-interaction --prefer-dist --optimize-autoloader
          fi

          # === Dépendances frontend ===
          if [ -f package.json ]; then
              echo "Installation des dépendances NPM..."
              npm ci || npm install
              npm run prod || npm run production || npm run build || echo "⚠️ Aucun script de build NPM trouvé."
          fi

          # === Optimisation Laravel ===
          echo "Optimisation du cache Laravel..."
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          # === Permissions finales ===
          echo "Application des permissions finales..."
          sudo chown -R www-data:www-data $APP_DIR
          sudo chmod -R 775 $APP_DIR/storage $APP_DIR/bootstrap/cache

          # === Nettoyage ===
          rm -rf $TEMP_DIR

          echo "✅ Déploiement terminé avec succès pour $APP_NAME"
          EOF
