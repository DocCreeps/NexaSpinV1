name: Build and deploy Laravel app to VPS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.x'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} /bin/bash << 'EOF'
          set -euo pipefail

          DEPLOY_DIR=/home/deploy/Roulette_Lara
          TEMP_DIR=/home/deploy/temp_backup

          echo "Début du déploiement - $(date)"

          # Crée les dossiers si besoin
          mkdir -p $TEMP_DIR $DEPLOY_DIR

          # Clone ou pull
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Premier déploiement → clone"
            rm -rf $DEPLOY_DIR
            git clone git@github.com:DocCreeps/Roulette_Lara.git $DEPLOY_DIR
            cd $DEPLOY_DIR
            cp .env.example .env
            php artisan key:generate
          else
            cd $DEPLOY_DIR
            [ -f .env ] && cp .env $TEMP_DIR/.env.backup
            git fetch --all
            git reset --hard origin/master
            git clean -fd
            [ -f $TEMP_DIR/.env.backup ] && cp $TEMP_DIR/.env.backup .env
          fi

          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

          if [ -f package.json ]; then
            npm ci --only=production
            npm run prod
          fi

          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan storage:link || true

          # Copie tout dans /var/www/html (seul endroit où Apache regarde)
          echo "Copie vers le dossier web public..."
          sudo rsync -av --delete \
            --exclude='.env' \
            --exclude='.git' \
            $DEPLOY_DIR/ /var/www/html/Roulette_Lara/

          # Permissions finales
          sudo chown -R www-data:www-data /var/www/html/Roulette_Lara
          sudo chmod -R 775 /var/www/html/Roulette_Lara/storage
          sudo chmod -R 775 /var/www/html/Roulette_Lara/bootstrap/cache

          # Nettoyage
          rm -rf $TEMP_DIR

          echo "DÉPLOIEMENT TERMINÉ AVEC SUCCÈS ! $(date)"
          EOF
