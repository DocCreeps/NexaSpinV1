name: Build and deploy Laravel app to VPS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.x'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -e

            # Variables
            APP_DIR="/var/www/html/Roulette_Lara"
            TEMP_DIR="/var/www/html/temp_backup"

            # Debug
            echo "Connected as: \$(whoami)"
            echo "Working directory: \$(pwd)"

            # Créer le répertoire si nécessaire
            if [ ! -d "\$APP_DIR" ]; then
              git clone git@github.com:DocCreeps/Roulette_Lara.git "\$APP_DIR"
            fi

            cd "\$APP_DIR"

            # Ajuster les permissions pour l'utilisateur SSH avant git pull
            sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} "\$APP_DIR"
            sudo chmod -R 755 "\$APP_DIR"

            # Vérifier si c'est un dépôt Git
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/master
            else
              git clone git@github.com:DocCreeps/Roulette_Lara.git "\$APP_DIR"
            fi

            # Backup du .env
            mkdir -p "\$TEMP_DIR"
            if [ -f .env ]; then
              cp .env "\$TEMP_DIR/.env.backup"
            fi

            # Restaurer le .env après git pull
            if [ -f "\$TEMP_DIR/.env.backup" ]; then
              cp "\$TEMP_DIR/.env.backup" .env
            fi

            rm -rf "\$TEMP_DIR"

            # Installer Composer
            if [ -f composer.json ]; then
              composer install --no-interaction --prefer-dist --optimize-autoloader
            fi

            # Installer npm
            if [ -f package.json ]; then
              npm install
              npm run prod
            fi

            # Générer .env si absent
            if [ ! -f .env ]; then
              if [ -f .env.example ]; then
                cp .env.example .env
                php artisan key:generate
              fi
            fi

            # Cacher config, routes, views
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Permissions finales pour www-data
            sudo chown -R www-data:www-data "\$APP_DIR"

            echo "Deployment successful"
          EOF
