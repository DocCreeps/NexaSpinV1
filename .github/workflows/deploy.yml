name: Build and deploy Laravel app to VPS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.x'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} /bin/bash << 'EOF'
          set -euo pipefail

          DEPLOY_DIR=/var/www/html/Roulette_Lara
          TEMP_DIR=/var/www/html/temp_backup

          echo "🚀 Début du déploiement - $(date)"

          # === Vérifications préalables ===
          if ! sudo -n true 2>/dev/null; then
            echo "❌ Pas de sudo sans password"
            exit 1
          fi

          if ! git ls-remote git@github.com:DocCreeps/Roulette_Lara.git HEAD &>/dev/null; then
            echo "❌ Clé SSH GitHub non configurée sur le VPS !"
            echo "   Ajoute la clé publique suivante sur GitHub → Deploy keys :"
            echo "   $(cat ~/.ssh/id_ed25519.pub || cat ~/.ssh/id_rsa.pub)"
            exit 1
          fi

          mkdir -p $TEMP_DIR

          # === Clone ou Pull ===
          if [ ! -d "$DEPLOY_DIR" ]; then
            echo "📦 Premier déploiement → clone"
            git clone git@github.com:DocCreeps/Roulette_Lara.git $DEPLOY_DIR
            cd $DEPLOY_DIR
            cp .env.example .env
            php artisan key:generate
          else
            cd $DEPLOY_DIR
            [ -f .env ] && cp .env $TEMP_DIR/.env.backup
            git reset --hard origin/master
            git pull origin master
            [ -f $TEMP_DIR/.env.backup ] && cp $TEMP_DIR/.env.backup .env
          fi

          # === Dépendances ===
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

          if [ -f package.json ]; then
            npm ci --only=production
            npm run prod
          fi

          # === Laravel ===
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan storage:link || true

          # === Permissions ===
          sudo chown -R www-data:www-data $DEPLOY_DIR
          sudo find $DEPLOY_DIR/storage $DEPLOY_DIR/bootstrap/cache -type d -exec chmod 775 {} \;
          sudo find $DEPLOY_DIR/storage $DEPLOY_DIR/bootstrap/cache -type f -exec chmod 664 {} \;

          # === Nettoyage ===
          rm -rf $TEMP_DIR

          echo "✅ Déploiement terminé avec succès ! $(date)"
          EOF
