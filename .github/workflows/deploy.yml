name: Build and deploy Laravel app to VPS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.x'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'EOF'
  echo "✅ Connexion SSH OK"
  whoami
  pwd
  EOF

- name: Deploy to VPS
  run: |
    ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'EOF'
  echo "=== 🚀 Début du déploiement ==="

  # Vérifier les permissions
  sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /var/www/html
  sudo chmod -R 755 /var/www/html

  # Cloner le dépôt s'il n'existe pas
  if [ ! -d /var/www/html/Roulette_Lara ]; then
  git clone git@github.com:DocCreeps/Roulette_Lara.git /var/www/html/Roulette_Lara
  fi

  cd /var/www/html/Roulette_Lara

  # Sauvegarde temporaire du .env
  TEMP_DIR=/var/www/html/temp_backup
  mkdir -p $TEMP_DIR
  if [ -f .env ]; then
  cp .env $TEMP_DIR/.env.backup
  fi

  # Pull du dépôt
  git fetch origin master
  git reset --hard origin/master
  git pull origin master

  # Restauration du .env
  if [ -f $TEMP_DIR/.env.backup ]; then
  cp $TEMP_DIR/.env.backup .env
  fi
  rm -rf $TEMP_DIR

  # Composer
  if [ -f composer.json ]; then
  composer install --no-interaction --prefer-dist --optimize-autoloader
  else
  echo "composer.json manquant ❌"
  exit 1
  fi

  # NPM
  if [ -f package.json ]; then
  npm ci || npm install
  npm run build || npm run prod || npm run production
  else
  echo "package.json manquant ❌"
  exit 1
  fi

  # Vérification .env
  if [ ! -f .env ]; then
  if [ -f .env.example ]; then
  cp .env.example .env
  php artisan key:generate
  else
  echo ".env.example manquant ❌"
  exit 1
  fi
  fi

  # Optimisation Laravel
  php artisan optimize:clear || true
  php artisan config:cache || true
  php artisan route:cache || true
  php artisan view:cache || true

  # Permissions finales
  sudo chown -R www-data:www-data /var/www/html/Roulette_Lara
  sudo chmod -R 775 /var/www/html/Roulette_Lara/storage /var/www/html/Roulette_Lara/bootstrap/cache

  echo "✅ Déploiement terminé avec succès"
  EOF
