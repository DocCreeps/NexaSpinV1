name: Build and deploy Laravel app to VPS

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.x'  # set this to the PHP version to use

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Configuration de la clé SSH
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 2. Déploiement via SSH
      - name: Deploy to VPS
        run: |
          # --- Définition des variables sur le runner local pour le script SSH ---
          SSH_USER=${{ secrets.SSH_USER }}
          SSH_HOST=${{ secrets.SSH_HOST }}

          # --- Lancement de la connexion SSH et des commandes sur le VPS ---
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << EOF

          APP_DIR=/var/www/html/Roulette_Lara
          TEMP_DIR=/tmp/laravel_backup_$$ # Utiliser /tmp pour un répertoire temporaire sûr

          echo "Démarrage du déploiement sur \$APP_DIR"

          # 1. S'assurer que le répertoire de l'application est créé et appartient à l'utilisateur SSH
          if [ ! -d \$APP_DIR ]; then
              echo "Répertoire non trouvé, tentative de création et de clonage initial."
              # Tente de créer le répertoire (nécessite 'sudo' si /var/www/html est possédé par root)
              sudo mkdir -p \$APP_DIR
              # On définit les permissions pour que l'utilisateur SSH puisse écrire dans le répertoire.
              sudo chown -R $SSH_USER:$SSH_USER \$APP_DIR
              git clone git@github.com:DocCreeps/Roulette_Lara.git \$APP_DIR
          fi

          # Entrer dans le répertoire de l'application
          cd \$APP_DIR

          # Assurer les permissions pour l'utilisateur SSH pour les opérations Git et de fichiers
          # CORRECTION CRITIQUE: L'échec du 'sudo' ici a bloqué le script.
          # L'utilisateur SSH DOIT être configuré pour un 'sudo sans mot de passe' sur le VPS.
          sudo chown -R $SSH_USER:$SSH_USER .

          # CORRECTION D'ERREUR GIT: Permettre à Git de faire des opérations si l'utilisateur SSH n'est pas le propriétaire originel
          git config --global --add safe.directory \$APP_DIR

          # 2. Gestion du fichier .env
          mkdir -p \$TEMP_DIR
          if [ -f .env ]; then
              echo "Sauvegarde du fichier .env existant."
              cp .env \$TEMP_DIR/.env.backup
          fi

          # 3. Pull des dernières modifications
          echo "Mise à jour du dépôt Git..."
          git reset --hard origin/master
          git pull origin master

          # 4. Restauration/Création du .env (Doit être avant Composer/Artisan)
          if [ -f \$TEMP_DIR/.env.backup ]; then
              echo "Restauration du fichier .env sauvegardé."
              mv \$TEMP_DIR/.env.backup .env
          elif [ ! -f .env ]; then
              if [ -f .env.example ]; then
                  echo "Création du .env à partir de .env.example."
                  cp .env.example .env
                  php artisan key:generate
              fi
          fi

          # 5. Dépendances PHP (Composer)
          if [ -f composer.json ]; then
              echo "Exécution de Composer install..."
              composer install --no-interaction --prefer-dist --optimize-autoloader
          else
              echo "Le fichier composer.json n'existe pas. SKIP."
          fi

          # 6. Dépendances Frontend (NPM)
          if [ -f package.json ]; then
              echo "Exécution de NPM install et compilation des assets..."
              npm install
              # CORRECTION NPM: Essayer 'production', sinon essayer 'build' (le plus standard pour Vite/Mix récent)
              npm run production || npm run build || echo "NPM build script failed. Check your package.json."
          else
              echo "Le fichier package.json n'existe pas. SKIP."
          fi

          # 7. Optimisation et Migrations Laravel
          echo "Optimisation Laravel et cache..."
          php artisan optimize:cl

          # 8. Nettoyage
          rm -rf \$TEMP_DIR

          # 9. Définir les permissions finales pour le serveur Web (www-data)
          echo "Définition des permissions finales pour www-data..."
          # L'utilisateur du serveur web doit posséder les fichiers
          # CORRECTION CRITIQUE: Cette commande 'sudo' peut aussi demander un mot de passe et bloquer le script.
          sudo chown -R www-data:www-data \$APP_DIR
          # Les répertoires de cache et de stockage doivent être accessibles en écriture par www-data
          sudo chmod -R 775 \$APP_DIR/storage
          sudo chmod -R 775 \$APP_DIR/bootstrap/cache

          echo "Deployment successful"
          EOF
