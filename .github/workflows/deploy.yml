name: Build and deploy Laravel app to VPS
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
env:
  PHP_VERSION: '8.x'
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'EOF'
          set -euo pipefail

          sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /var/www/html
          sudo chmod -R 755 /var/www/html

          cd /var/www/html/Roulette_Lara

          TEMP_DIR=/var/www/html/temp_backup
          mkdir -p $TEMP_DIR
          [ -f .env ] && cp .env $TEMP_DIR/.env.backup

          git reset --hard origin/master
          git clean -fdx
          git pull origin master

          [ -f $TEMP_DIR/.env.backup ] && cp $TEMP_DIR/.env.backup .env
          rm -rf $TEMP_DIR

          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

          if [ -f package.json ]; then
            npm ci --only=production
            npm run build
          fi

          [ ! -f .env ] && cp .env.example .env && php artisan key:generate --force

          php artisan migrate --force --no-interaction || true
          php artisan config:cache --no-interaction
          php artisan route:cache --no-interaction
          php artisan view:cache --no-interaction

          sudo chown -R www-data:www-data /var/www/html/Roulette_Lara
          sudo chmod -R 775 storage bootstrap/cache

          echo "Deployment successful"
          EOF
